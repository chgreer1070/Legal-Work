{% extends "base.html" %}
{% block title %}Predictions - FX Recovery{% endblock %}

{% block content %}
<div class="fx-header">
    <h1>FX Breach Predictions</h1>
    <button id="btn-run-predictions" type="button" class="btn btn-primary">Run Predictions</button>
</div>

<div class="table-card">
    <table class="fx-table">
        <thead>
            <tr>
                <th>Currency Pair</th>
                <th>Breach Probability</th>
                <th>Direction</th>
                <th>Horizon</th>
                <th>Confidence Range</th>
                <th>Model</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="predictions-table">
            <tr><td colspan="7" class="loading">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-run-predictions').addEventListener('click', runPredictions);
    loadPredictions();
});

async function loadPredictions() {
    try {
        const resp = await fetch('/fx/api/predictions');
        const predictions = await resp.json();
        const tbody = document.getElementById('predictions-table');
        if (predictions.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-state">
                <div class="empty-state-title">No predictions yet</div>
                <div class="empty-state-hint">Click <strong>Run Predictions</strong> to forecast breach probability across all configured currency pairs.</div>
            </td></tr>`;
        } else {
            tbody.innerHTML = predictions.map(p => `
                <tr>
                    <td><strong>${p.currency_pair}</strong></td>
                    <td>
                        <div class="prob-bar">
                            <div class="prob-fill ${p.crossing_probability > 0.5 ? 'prob-high' : 'prob-low'}"
                                 style="width:${(p.crossing_probability * 100).toFixed(0)}%"></div>
                            <span>${(p.crossing_probability * 100).toFixed(1)}%</span>
                        </div>
                    </td>
                    <td>${p.predicted_direction}</td>
                    <td>${p.horizon_days} days</td>
                    <td>${p.confidence_lower ? p.confidence_lower.toFixed(4) + ' - ' + p.confidence_upper.toFixed(4) : '--'}</td>
                    <td>${p.model_version}</td>
                    <td>${p.prediction_date || '--'}</td>
                </tr>
            `).join('');
        }
    } catch(e) { console.error('Load predictions error:', e); }
}

async function runPredictions() {
    const btn = document.getElementById('btn-run-predictions');
    await withButtonLoading(btn, async () => {
        try {
            const resp = await fetch('/fx/api/predictions/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({threshold_pct: 5.0, horizon_days: 30})
            });
            if (resp.ok) {
                const data = await resp.json();
                showToast(`Forecast complete for ${data.length} currency pairs`, 'success');
                loadPredictions();
            } else {
                showToast('Prediction failed', 'error');
            }
        } catch(e) { showToast('Error: ' + e.message, 'error'); }
    });
}
</script>
{% endblock %}
